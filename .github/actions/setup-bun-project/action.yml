name: Setup Bun project
description: Install Bun and project dependencies with a frozen lockfile. Requires the repo to be checked out beforehand.

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: 1.3.14

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
