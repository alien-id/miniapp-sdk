name: Contract Package

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "packages/contract/src/**"
      - "packages/contract/scripts/**"
    tags:
      - "contract@*"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "packages/contract/src/**"
      - "packages/contract/scripts/**"
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/contract@')
    uses: ./.github/workflows/reusable-publish-npm-package.yml
    permissions:
      contents: write
      id-token: write
    with:
      package-name: contract
      generate-schemas: true
