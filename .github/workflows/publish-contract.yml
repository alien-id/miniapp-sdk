name: Contract Package

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "packages/contract/src/**"
      - "packages/contract/scripts/**"
    tags:
      - "contract@*"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "packages/contract/src/**"
      - "packages/contract/scripts/**"
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

jobs:
  build:
    name: Build contract package
    if: startsWith(github.ref, 'refs/tags/contract@')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      npm-tag: ${{ steps.npm-tag.outputs.tag }}
      version: ${{ steps.npm-tag.outputs.version }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate tag matches package.json version
        working-directory: packages/contract
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PACKAGE_VERSION=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version);")
          EXPECTED_TAG="contract@${PACKAGE_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Error: Tag $TAG_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "✓ Tag matches package.json version"

      - name: Build package
        working-directory: packages/contract
        run: bun run build

      - name: Generate JSON schemas
        working-directory: packages/contract
        run: bun run generate-schemas

      - name: Pack with Bun
        working-directory: packages/contract
        run: bun pm pack

      - name: Determine npm tag
        id: npm-tag
        working-directory: packages/contract
        run: |
          VERSION=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version);")
          if [[ "$VERSION" == *"-alpha"* ]]; then
            TAG=alpha
          elif [[ "$VERSION" == *"-beta"* ]]; then
            TAG=beta
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION with tag: $TAG"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contract-tarball
          path: packages/contract/alien-id-miniapps-contract-*.tgz
          retention-days: 7
          if-no-files-found: error

      - name: Upload JSON schema artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: contract-schemas
          path: |
            packages/contract/artifacts/events.schema.json
            packages/contract/artifacts/methods.schema.json
          retention-days: 90

  publish:
    name: Publish contract package to npm
    needs: build
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443

      - name: Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: contract-tarball

      - name: Download schema artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: contract-schemas
          path: schemas

      - name: Configure npm for trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish ./alien-id-miniapps-contract-*.tgz --access public --provenance --tag ${{ needs.build.outputs.npm-tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          append_body: true
          prerelease: ${{ needs.build.outputs.npm-tag != 'latest' }}
          make_latest: ${{ needs.build.outputs.npm-tag == 'latest' }}
          body: |
            ## npm
            https://www.npmjs.com/package/@alien-id/miniapps-contract
          files: |
            schemas/events.schema.json
            schemas/methods.schema.json
