name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Default-deny at the top level. Each job re-grants the minimum it needs.
permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Biome
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51 # v2.7.1
        with:
          version: 2.4.15

      - name: Run Biome
        run: biome ci .

  checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Typecheck
            run: |
              bun run build
              bun run --filter './packages/*' typecheck
          - name: Test
            run: bun run test
          - name: Build packages
            run: bun run build
          - name: Generate schemas (smoke)
            run: cd packages/contract && bun run generate-schemas

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Bun project
        uses: ./.github/actions/setup-bun-project

      - name: ${{ matrix.name }}
        run: ${{ matrix.run }}

  changeset-status:
    name: Changeset status (advisory)
    # Pure information: surfaces what the next Version PR would compute given
    # the changesets present on this PR. Never fails — `changesets/bot` (GitHub
    # App) is the conversational nudge for "you forgot a changeset", and
    # reviewer attention is the gate.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun project
        uses: ./.github/actions/setup-bun-project

      - name: Show pending changesets
        # --since narrows the diff to the PR's actual changes. The base ref is
        # exposed as `github.base_ref` (e.g. "main") on pull_request events.
        run: bun changeset status --since=origin/${{ github.base_ref }} --verbose
        continue-on-error: true
