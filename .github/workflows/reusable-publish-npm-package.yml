name: Publish npm package (reusable)

on:
  workflow_call:
    inputs:
      package-name:
        description: Package directory name and tag prefix (e.g. bridge, auth-client, contract).
        required: true
        type: string
      generate-schemas:
        description: Run `bun run generate-schemas` and attach the generated JSON schemas to the GitHub release.
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  build:
    name: Build ${{ inputs.package-name }} package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      npm-tag: ${{ steps.npm-tag.outputs.tag }}
      version: ${{ steps.npm-tag.outputs.version }}

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun project
        uses: ./.github/actions/setup-bun-project

      - name: Validate tag matches package.json version
        working-directory: packages/${{ inputs.package-name }}
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PACKAGE_VERSION=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version);")
          EXPECTED_TAG="${{ inputs.package-name }}@${PACKAGE_VERSION}"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Error: Tag $TAG_NAME does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "✓ Tag matches package.json version"

      - name: Build package
        working-directory: packages/${{ inputs.package-name }}
        run: bun run build

      - name: Generate JSON schemas
        if: inputs.generate-schemas
        working-directory: packages/${{ inputs.package-name }}
        run: bun run generate-schemas

      - name: Pack with Bun
        working-directory: packages/${{ inputs.package-name }}
        run: bun pm pack

      - name: Determine npm tag
        id: npm-tag
        working-directory: packages/${{ inputs.package-name }}
        run: |
          VERSION=$(bun -e "const pkg = await Bun.file('package.json').json(); console.log(pkg.version);")
          if [[ "$VERSION" == *"-alpha"* ]]; then
            TAG=alpha
          elif [[ "$VERSION" == *"-beta"* ]]; then
            TAG=beta
          else
            TAG=latest
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION with tag: $TAG"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.package-name }}-tarball
          path: packages/${{ inputs.package-name }}/alien-id-miniapps-${{ inputs.package-name }}-*.tgz
          retention-days: 7
          if-no-files-found: error

      - name: Upload JSON schema artifacts
        if: inputs.generate-schemas
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ inputs.package-name }}-schemas
          path: |
            packages/${{ inputs.package-name }}/artifacts/events.schema.json
            packages/${{ inputs.package-name }}/artifacts/methods.schema.json
          retention-days: 90

  publish:
    name: Publish ${{ inputs.package-name }} package to npm
    needs: build
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            uploads.github.com:443

      - name: Download tarball artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.package-name }}-tarball

      - name: Download schema artifacts
        if: inputs.generate-schemas
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.package-name }}-schemas
          path: schemas

      - name: Configure npm for trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish ./alien-id-miniapps-${{ inputs.package-name }}-*.tgz --access public --provenance --tag ${{ needs.build.outputs.npm-tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          append_body: true
          prerelease: ${{ needs.build.outputs.npm-tag != 'latest' }}
          make_latest: ${{ needs.build.outputs.npm-tag == 'latest' }}
          body: |
            ## npm
            https://www.npmjs.com/package/@alien-id/miniapps-${{ inputs.package-name }}
          files: |
            ${{ inputs.generate-schemas && 'schemas/events.schema.json' || '' }}
            ${{ inputs.generate-schemas && 'schemas/methods.schema.json' || '' }}
