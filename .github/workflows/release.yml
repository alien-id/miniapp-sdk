name: Release

# Single publish path. On every push to main, changesets/action either:
#   - opens/updates the "chore: release packages" Version PR (if pending changesets exist), or
#   - runs the publish path (if the Version PR was just merged).
# The npm-publish environment gate forces a human reviewer approval before any publish.
#
# Security envelope (preserved verbatim from the previous reusable-publish-npm-package.yml,
# extended to defend against the TanStack/Astro 2025 supply-chain attack class):
#   - All third-party actions pinned to commit SHA (defeats tag-overwrite attacks
#     like tj-actions/changed-files compromise from March 2025).
#   - step-security/harden-runner with egress-policy: block + tight allowlist
#     prevents data exfiltration if any step is compromised.
#   - oven-sh/setup-bun INLINED (not via composite action) with cache: false.
#     Action caching is a known exfil vector for OIDC tokens (TanStack/Astro postmortems).
#   - persist-credentials: false on checkout drops GITHUB_TOKEN from git config;
#     changesets/action re-injects via env when it needs to push.
#   - id-token: write granted only to this job (least privilege) for OIDC trusted
#     publishing — no long-lived NPM_TOKEN exists anywhere.
#   - NPM_TOKEN explicitly set to empty string to defeat any default fallback to
#     a static credential.
#   - npm publish --provenance attaches sigstore attestation to every artifact.
#   - concurrency.cancel-in-progress: false so a mid-publish run is never killed.

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Default the entire workflow to zero permissions; jobs opt in to what they need.
permissions: {}

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      # changesets/action commits to changeset-release/main and creates git tags on publish.
      contents: write
      # changesets/action opens or updates the Version PR.
      pull-requests: write
      # OIDC trusted publishing + sigstore provenance.
      id-token: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            registry.npmjs.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            uploads.github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Token is not written to git config; changesets/action re-injects from env.
          persist-credentials: false
          # Full history + tags so changesets can compute changelogs and tag releases.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        # Inlined with cache: false. Caching during OIDC-holding workflows is the
        # supply-chain attack vector cited by the TanStack and Astro 2025 postmortems.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Node for OIDC trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.16.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Run changesets
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: bun run ci:version
          publish: bun run ci:publish
          commit: 'chore: release packages'
          title: 'chore: release packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force OIDC. No static NPM_TOKEN exists; this empty value defeats any
          # accidental fallback to a workflow-level or org-level secret.
          NPM_TOKEN: ''

      - name: Summary
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "## Published" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | "- \(.name)@\(.version)"' >> "$GITHUB_STEP_SUMMARY"
